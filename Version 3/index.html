<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Health Diet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Planet Health Diet</header>

<nav>
  <button onclick="showTab('home')" id="btn-home" class="glass mnav">Home</button>
  <button onclick="showTab('info')" id="btn-info" class="glass mnav">Was ist das?</button>
  <button onclick="showTab('foods')" id="btn-foods" class="glass mnav">Lebensmittel</button>
  <button onclick="showTab('quiz')" id="btn-quiz" class="glass mnav">Quiz</button>
</nav>

<div class="info glass" id="content"></div>

<nav>
  <button onclick="show_piechart(phd)" class="glass continent">PHD</button>
  <button onclick="show_piechart(north_america)" class="glass continent">Nordamerika</button>
  <button onclick="show_piechart(europe)" class="glass continent">Europa</button>
</nav>

<div class="content glass" style="padding: 0px;">
  <canvas onclick="piechart()"  id="pieChart" width="300" height="300" class="piechart"> </canvas>
</div>

<div class="background">
  <div class="blob blob1 anim3"></div>
  <div class="blob blob2 anim2"></div>
  <div class="blob blob3 anim1"></div>
</div>

<script src="script.js"></script>

</body>
</html>
