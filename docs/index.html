<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Health Diet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="basic">

<header>Planetary Health Diet</header>

<nav class="glass mnav">
  <div id="nav-indicator" style="transform: translateX(0%);"></div>
  <button id="home" class="active">Home</button>
  <button id="info">Was ist das?</button>
  <button id="quiz">Quiz</button>
  <button id="piechart">Kreisdiagramm</button>
  <button id="barchart">Säulendiagramm</button>
</nav>

<div class="basic" id="placeholder"></div>

<div class="background">
  <div class="blob" style="--d: -17s; --dur: 10s; --anim: move4; --animd: -8s"></div>
  <div class="blob" style="--d: -20s; --dur: 12s; --anim: move4; --animd: -6s"></div>
  <div class="blob" style="--d: -25s; --dur: 14s; --anim: move4; --animd: -4s"></div>
  <div class="blob" style="--d: -30s; --dur: 16s; --anim: move4; --animd: -2s"></div>
</div>

<script src="script.js"></script>

</body>
</html>
