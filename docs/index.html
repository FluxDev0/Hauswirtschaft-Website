<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Health Diet</title>
  <div id="css-links">
    <link id="normal-css" rel="stylesheet" href="desktop.css" media="screen and (min-width: 1501px)">
    <link id="mobile-css" rel="stylesheet" href="mobile.css" media="screen and (max-width: 1500px)">
  </div>
</head>
<body class="basic" style='--bgcolor: #01050c;'>

<header>Planetary Health Diet</header>

<nav class="glass mnav">
  <div id="nav-indicator" style="transform: translateX(0%);"></div>
  <button data-show="home" class="active" title="Warum ist dein Cursor so lange hier?">Home</button>
  <button data-show="info">Was ist das?</button>
  <button data-show="quiz">Quiz</button>
  <button data-show="piechart">Kreisdiagramm</button>
  <button data-show="barchart">Säulendiagramm</button>
</nav>

<div class="basic" id="placeholder"></div>

<div class="background">
  <div class="blob" style="--anim1dur: 40s; --anim1del: -0s; --anim2dur: 40s; --anim2del: -15s;"></div>
  <div class="blob" style="--anim1dur: 40s; --anim1del: -5s; --anim2dur: 40s; --anim2del: -10s;"></div>
  <div class="blob" style="--anim1dur: 40s; --anim1del: -10s; --anim2dur: 40s; --anim2del: -5s;"></div>
  <div class="blob" style="--anim1dur: 40s; --anim1del: -15s; --anim2dur: 40s; --anim2del: -0s;"></div>
</div>

<script src="script.js"></script>

</body>
</html>
