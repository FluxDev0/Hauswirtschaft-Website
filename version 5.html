<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Health Diet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: rgb(9, 9, 19);
    }

    .basic {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      gap: 20px;
      margin: 0;
    }

    header {
      text-align: center;
      padding-top: 20px;
      font-size: 350%;
      font-weight: bold;
      color: rgba(255, 255, 255, 1);
    }

    button:hover {
      background-color: rgba(220, 222, 230, 0.8);
      transform: scale(1.05);
    }

    h5 {
      font-size: 40px;
      font-weight: bold;
      margin: 10px;
      text-align: center;
    }

    h6 {
      text-align: center;
      margin: 0;
    }

    #barChartContainer {
      position: relative;
      width: fit-content;
      margin: 0 auto;
      align-items: flex-end;
      display: flex;
      height: 640px;
      gap: 10px;
      padding: 20px;
      padding-bottom: 80px;
    }

    #barChartContainer:hover {
      transform: none;
    }

    .bar {
      position: relative;
      margin: 0;
      width: 80px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, height 1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bar:hover {
      transform: scale(1.05);
    }

    .bar span.label {
      display: inline-block;
      position: absolute;
      top: calc(100% + 5px);
      left: 20%;
      font-size: 16px;
      transform-origin: left top;
      transform: rotate(30deg);
      white-space: nowrap;
      margin-top: 5px;
    }

    .bar span#barvalue {
      position: relative;
      top: -22px;
      font-size: 16px;
    }

    nav {
      display: flex;
      justify-content: center;
      height: 50px;
      gap: 0px;
      width: var(--width);
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      background-color: rgba(220, 222, 230, 0.5);
      transition: background-color 0.5s ease, transform 0.3s ease;
    }

    nav button {
      z-index: 1;
      background: transparent;
      color: white;
      font-size: 14px;
      font-weight: bold;
      transition: color 0.5s ease;
    }

    nav.glass button {
      height: calc(100% - 8px);
      background-color: transparent;
      padding: 0px;
      margin: 4px 4px;
      border-radius: 25px;
      transition: background-color 0.6s ease, font-size 0.3s ease, color 0.5s ease;
      width: calc((100% / var(--buttons-per-row)) - 8px);
    }

    nav.glass button:hover {
      background-color: rgba(255, 255, 255, 0.3);
      font-size: 16px;
      transform: none;
    }

    nav.glass button.active:hover {
      background-color: transparent;
    }

    .mnav {
      --buttons-per-row: 6;
      --width: calc(60% + 40px);
    }

    .regnav {
      --buttons-per-row: 3;
      --width: calc(60% + 40px);
    }

    nav.glass button.active {
      color: rgb(0, 0, 0);
    }

    nav #nav-indicator {
      width: calc((100% / var(--buttons-per-row)) - 8px);
    }

    nav.glass #nav-indicator {
      position: absolute;
      z-index: 0;
      bottom: 4px;
      left: 4px;
      height: calc(100% - 8px);
      background-color: rgb(255, 255, 255);
      border-radius: 20px;
      transition: transform 0.5s cubic-bezier(0.68, -0.3, 0.32, 1.3);
    }

    .content {
      width: fit-content;
      padding: 0px 0px;
      background: white;
      border-radius: 45px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      color: rgb(255, 255, 255);
    }

    .info {
      margin: 0 auto;
      padding: 20px 20px;
      background: white;
      border-radius: 15px;
      color: rgb(255, 255, 255);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .good {
      background: #a8e6cf;
    }

    .bad {
      background: #ffaaa5;
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      border-radius: 25px;
      transition: transform 0.5s ease, background-color 0.5s ease;
    }

    .glass:hover {
      background: rgba(255, 255, 255, 0.13);
      transform: scale(1.02);
    }

    button.glass:hover {
      background: rgba(255, 255, 255, 0.13);
      transform: scale(1.08);
    }

    button.glass.active {
      background: linear-gradient(to right, rgb(14, 219, 106), rgb(136, 223, 118));
      transform: scale(1.15);
      backdrop-filter: blur(10px);
      transition: transform 0.5s ease;
    }

    button.glass.active:hover {
      transform: scale(1.1);
    }

    .piechart {
      display: block;
      margin: auto;
      transition: transform 0.5s ease, filter 0.5s ease;
    }

    .piechart:hover {
      transform: scale(1.15);
      filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
    }

    .debug {
      outline: 1px solid red;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -1;
      filter: blur(150px); /* DAS macht den Magic Effekt */
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
    }

    .blob1 {
      background: #14bd1d;
      top: 50%;
      left: 40%;
    }

    .blob2 {
      background: #df380e;
      top: 10%;
      left: 10%;
    }

    .blob3 {
      background: #0c9dc9;
      top: 40%;
      left: 70%;
    }

    .anim1 {
      animation: move1 4s infinite alternate ease-in-out;
    }

    .anim2 {
      animation: move2 3s infinite alternate ease-in-out;
    }

    .anim3 {
      animation: move3 5.5s infinite alternate ease-in-out;
    }

    @keyframes move1 {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-15%, 15%); }
      100% { transform: translate(15%, -20%); }
    }

    @keyframes move2 {
      0% { transform: translate(0, 0); }
      50% { transform: translate(15%, -10%); }
      100% { transform: translate(-20%, 15%); }
    }

    @keyframes move3 {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-5%, 10%); }
      100% { transform: translate(30%, -10%); }
    }
  </style>
</head>
<body class="basic">

<header>Planetary Health Diet</header>

<nav class="glass mnav">
  <div id="nav-indicator" styles="transform: translateX(0%);"></div>
  <button id="home" class="active">Home</button>
  <button id="info">Was ist das?</button>
  <button id="foods">Lebensmittel</button>
  <button id="quiz">Quiz</button>
  <button id="piechart">Kreisdiagramm</button>
  <button id="barchart">Säulendiagramm</button>
</nav>

<div class="basic" id="placeholder"></div>

<div class="background">
  <div class="blob blob1 anim3"></div>
  <div class="blob blob2 anim2"></div>
  <div class="blob blob3 anim1"></div>
</div>

<script>
  let score = 0;
let answered = false;

const placeholder = document.getElementById("placeholder");
const html = document.innerHTML;
const mnav = document.querySelector("nav.mnav #nav-indicator");

function showTab(tab) {
  if (tab === "home") {
    placeholder.innerHTML = `
      <div class="info glass" id="content">
        <h5>Eine Website über die Planetary Health Diet.</h5>
        <h6>ohne KI.</h6>
      </div>
    `;
  }

  if (tab === "info") {
    placeholder.innerHTML = `
      <div class="info glass" id="content">
      <ul>
        <li>Weniger Fleisch</li>
        <li>Mehr Gemüse</li>
        <li>Weniger Zucker</li>
        <li>Nachhaltigkeit</li>
      </ul>
      </div>
    `;
  }

  if (tab === "foods") {
    placeholder.innerHTML = `
      <div class="info glass" id="content">
      <div class="grid">
        <div class="card good">Gemüse 👍</div>
        <div class="card good">Obst 👍</div>
        <div class="card good">Vollkorn 👍</div>
        <div class="card bad">Fleisch 👎</div>
        <div class="card bad">Zucker 👎</div>
      </div>
      </div>
    `;
  }

  if (tab === "quiz") {
    answered = false;
    placeholder.innerHTML = `
      <div class="info glass" id="content">
      <h2>Quiz</h2>
      <p>Ist viel Fleisch gut?</p>
      <button class="glass" onclick="answer(false)">Ja</button>
      <button class="glass" onclick="answer(true)">Nein</button>
      <p id="result"></p>
      </div>
    `;
  }

  if (tab === "piechart") {
    placeholder.innerHTML = `
      <nav class="glass regnav">
        <div id="nav-indicator" styles="transform: translateX(0%);"></div>
        <button onclick="show_barchart(phd)" class="active">PHD</button>
        <button onclick="show_barchart(north_america)">Nordamerika</button>
        <button onclick="show_barchart(europe);">Europa</button>
      </nav>

      <div class="content glass" style="padding: 0px;">
        <canvas id="pieChart" width="300" height="300" class="piechart"> </canvas>
      </div>
    `;
    show_piechart(phd);
    continents();
  }

  if (tab === "barchart") {
    placeholder.innerHTML = `
      <nav class="glass regnav">
        <div id="nav-indicator" styles="transform: translateX(0%);"></div>
        <button onclick="show_barchart(phd)" class="active">PHD</button>
        <button onclick="show_barchart(north_america)">Nordamerika</button>
        <button onclick="show_barchart(europe);">Europa</button>
      </nav>

      <div class="content glass" id="barChartContainer"></div>
    `;
    continents();
    show_barchart(phd);
  }
}

function answer(correct) {
  if (!answered) {
    if (correct) score++;
    answered = true;
    document.getElementById("result").innerText = "Punkte: " + score;
  }
}

function continents() {
  document.querySelectorAll("nav.regnav button").forEach((box, index) => {
      box.addEventListener("click", function() {
        document.querySelectorAll("nav.regnav button").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        navindication("regnav", index);
      });
    });
};

function navindication(navclass, index) {
  const nav = document.querySelector("nav." + navclass + " #nav-indicator");
  if (!nav) {console.log(index); console.log("nav." + navclass + " #nav-indicator")};
  nav.style.transform = `translateX(calc(${index} * (100% + 8px)))`;
}

function show_piechart(data) {
  const canvas = document.getElementById("pieChart");
  const ctx = canvas.getContext("2d");
  const total = data.reduce((sum, item) => sum + item.value, 0);

  let startAngle = 0;

  data.forEach(item => {
    const sliceAngle = (item.value / total) * 2 * Math.PI;

    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.arc(canvas.width/2, canvas.height/2, 100, startAngle, startAngle + sliceAngle);
    ctx.closePath();

    ctx.fillStyle = item.color;
    ctx.fill();

    startAngle += sliceAngle;
  });
}

function show_barchart(data) {
  const container = document.getElementById("barChartContainer");

  if (container.innerHTML !== "") {
    data.forEach(item => {
      const bar = document.getElementById(item.label);
      bar.style.height = (item.value * 1.3) + "px";
      bar.querySelector("#barvalue").textContent = item.value + "g";
      console.log("activated");
    });
  } else {
    data.forEach(item => {

      const bar = document.createElement("div");
      bar.classList.add("bar");
      bar.style.height = "0px";
      bar.style.backgroundColor = item.color;
      bar.id = item.label;

      const value = document.createElement("span");
      value.textContent = item.value + "g";
      value.id = "barvalue";
      bar.appendChild(value);

      const label = document.createElement("span");
      label.classList.add("label");
      label.textContent = item.label;
      label.id = "barlabel";
      bar.appendChild(label);

      container.appendChild(bar);
      setTimeout(function() {
        bar.style.height = (item.value * 1.3) + "px";
      }, 1);
    });
  };
}

document.querySelectorAll("nav.mnav button").forEach((box, index) => {
  box.addEventListener("click", function() {
    document.querySelectorAll("nav.mnav button").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    navindication("mnav", index);
    showTab(this.id);
  });
});

showTab('home');
</script>
